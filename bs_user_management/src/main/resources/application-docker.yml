feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000

logging:
  level:
    ROOT: INFO
    tech.jhipster: INFO
    org.hibernate.SQL: INFO
    com.pfe: INFO

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://bs-discovery:8761/eureka/

management:
  zipkin:
    tracing:
      endpoint: http://bs-zipkin:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0

spring:
  cloud:
    config:
      enabled: false
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:postgresql://postgres:5432/bsUserManagement
    username: postgres
    password: root1234
    driver-class-name: org.postgresql.Driver
    hikari:
      poolName: Hikari
      auto-commit: false
  liquibase:
    contexts: dev, faker
    url: jdbc:postgresql://postgres:5432/bsUserManagement
    clear-checksums: true
  messages:
    cache-duration: PT1S
  thymeleaf:
    cache: false
  kafka:
    topic:
      activity-audit:
        name: bs-activity-audit
        group: bs-group
      error-audit:
        name: bs-error-audit
        group: bs-group
    producer:
      bootstrap-servers: host.docker.internal:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topic: roles-topic
      properties:
        request:
          timeout:
            ms: 30000
        retry:
          backoff:
            ms: 1000
        metadata:
          max:
            age:
              ms: 300000
    admin:
      auto-create-topics: true

server:
  port: 8082
jhipster:
  registry:
    password: admin
  logging:
    use-json-format: false
    logstash:
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512
