<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Pré-inscription au compte</title>
</head>
<body style='font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 0;'>
<div
    style='max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;'>
  <h1 style='color: #333;'>Pré-inscription</h1>
  <p style='color: #555;'>Vous avez une demande de création de compte !</p>
  <h3 style='color: #333;'>Vous êtes rattaché à une entité en cours de création.</h3>
  <p style='color: #555;'>Veuillez cliquer sur le bouton ci-dessous pour créer votre compte :</p>
  <p>
    <a href="{{activationLink}}"
       style='display: inline-block; padding: 10px 20px; font-size: 16px; color: #fff; background-color: #2e7d32; text-decoration: none; border-radius: 5px;'>
      Créer mon compte
    </a>
  </p>
  <p style='color: #555;'>Si vous n’êtes pas à l’origine de cette demande, veuillez ignorer cet e-mail.</p>
  <p style='color: #555;'>Merci !</p>
</div>
</body>
</html>
