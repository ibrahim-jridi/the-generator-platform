<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" lang="en">
<head>
  <title th:text="#{email.notification.title}">JHipster creation</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <link rel="icon" th:href="@{|${baseUrl}/favicon.ico|}" />
</head>
<body>
<p th:text="#{email.notification.greeting(${user.firstName} + ' ' + ${user.lastName})}">Dear</p>
<p th:text="#{email.notification.text}">Your JHipster account has been created, please click on the URL below to access it:</p>
<p>
  <strong th:text="${name}">Notification Name</strong><br />
  <span th:text="${description}">Notification Description</span>
</p>
<p>
  <span th:text="#{email.notification.text}">Regards, </span>
  <br />
  <em th:text="#{email.signature}">JHipster.</em>
</p>
</body>
</html>
