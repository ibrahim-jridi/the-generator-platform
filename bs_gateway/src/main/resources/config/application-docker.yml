spring:
  security:
    oauth2:
      client:
        login-user-admin: admin          # ← this is what the @Value reads
        password-user-admin: pass
        provider:
          oidc:
            # DO NOT use issuer-uri — it triggers the discovery+validation that fails
            authorization-uri: http://localhost:8180/realms/bsrealm/protocol/openid-connect/auth
            token-uri: http://localhost:8180/realms/bsrealm/protocol/openid-connect/token
            user-info-uri: http://localhost:8180/realms/bsrealm/protocol/openid-connect/userinfo
            jwk-set-uri: http://localhost:8180/realms/bsrealm/protocol/openid-connect/certs
            user-name-attribute: preferred_username
        registration:
          oidc:
            client-id: bs_client
            client-secret: quT1y21Fwf1bAHrV7DprSGuPWtcsUpTE
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            provider: oidc
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  kafka:
    consumer:
      bootstrap-servers: host.docker.internal:9092
  cloud:
    config:
      enabled: false
    gateway:
      discovery:
        locator:
          lower-case-service-id: true
          enabled: true
      routes:
        - id: BSUserManagement
          uri: http://bs-user-management:8082
          predicates:
            - Method=GET, POST, PUT, DELETE, OPTIONS
            - Path=/user-management/**
        - id: BSWorkflowManagement
          uri: http://bs-workflow-management:8083
          predicates:
            - Method=GET, POST, PUT, DELETE, OPTIONS
            - Path=/workflow-management/**
        - id: BSNotificationManagement
          uri: http://bs-notification-management:8084
          predicates:
            - Method=GET, POST, PUT, DELETE, OPTIONS
            - Path=/notification-management/**
        - id: BSFileManagement
          uri: http://bs-file-management:8085
          predicates:
            - Method=GET, POST, PUT, DELETE, OPTIONS
            - Path=/file-management/**
        - id: BSFormManagement
          uri: http://bs-form-management:8087
          predicates:
            - Method=GET, POST, PUT, DELETE, OPTIONS
            - Path=/form-management/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://bs-discovery:8761/eureka/

management:
  zipkin:
    tracing:
      endpoint: http://bs-zipkin:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0

tokenvalidator:
  security:
    url_auth_server: http://keycloak:8080/
    cache_token_delay: 60
    cache_certs_keys_delay: 600

keycloak:
  realm: bsrealm
  auth-server-url: http://keycloak:8080/
  ssl-required: external
  resource: bs_client
  credentials:
    secret: quT1y21Fwf1bAHrV7DprSGuPWtcsUpTE
  use-resource-role-mappings: true
  principal-attribute: preferred_username

endpoint:
  gateway: http://bs-gateway:9999
  notification-management: http://bs-notification-management:8084

application:
  origins: "http://localhost:82"

bs:
  front-url: http://localhost:82

