<div class="row file-management pt-4">
  <div class="col-sm-12">
    <mat-card class="mat-card-without-elevation">
      <mat-card-content>
        <div class="col-12 d-flex">
          <!-- Toggle Button -->
          <div class="col-8">
            <button mat-button (click)="toggleTreeVisibility()">
              {{ isTreeVisible ? 'Hide Tree' : 'Show Tree' }}
            </button>
          </div>
          <!-- Action Buttons -->
          <div class="col-4 d-flex justify-content-end  mb-5">
            <button mat-mini-fab color="primary" (click)="addFolder()" *ngIf="navigationpath() == false">
              <mat-icon>add</mat-icon>
            </button>

            <div class="file-upload-wrapper" *ngIf="navigationpath() == false">
              <button mat-mini-fab color="primary">
                <mat-icon>attach_file</mat-icon>
                <input type="file" #myInput name="filename" (change)="selectFile($event)" />
              </button>
            </div>

            <button mat-mini-fab color="primary" [disabled]="!currentFile" (click)="preUpload()" *ngIf="navigationpath() == false">
              <mat-icon>save</mat-icon>
            </button>
            <div class="alert alert-light" role="alert" *ngIf="message">{{ message }}</div>
          </div>
        </div>

        <div class="row">
          <!-- File Tree Section -->
          <div class="col-3 nav-section" *ngIf="isTreeVisible">
            <mat-tree [dataSource]="dataSource" [treeControl]="treeControl" class="example-tree">
              <!-- Node definition for files (nodes without children) -->
              <mat-tree-node *matTreeNodeDef="let node" [@simpleFade]="node.level ? 1 : 0">
                <div class="mat-tree-node" [ngClass]="{'selected-node': selectedNode === node}" (click)="onNodeClick(node)">
                  <button mat-icon-button disabled></button>
                  {{ node.name }}
                </div>
              </mat-tree-node>

              <!-- Node definition for folders (nodes with children) -->
              <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild" matTreeNodePadding
                                    matTreeNodePaddingIndent="20" [@simpleFade]="node.level ? 1 : 0">
                <li>
                  <div class="mat-tree-node" [ngClass]="{'selected-node': selectedNode === node}" (click)="onNodeClick(node)">
                    <button mat-icon-button matTreeNodeToggle [attr.aria-label]="'toggle ' + node.name">
                      <mat-icon class="mat-icon-rtl-mirror">
                        {{ treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right' }}
                      </mat-icon>
                    </button>
                    {{ node.name }}
                  </div>
                  <ul [class.example-tree-invisible]="!treeControl.isExpanded(node)">
                    <ng-container matTreeNodeOutlet></ng-container>
                  </ul>
                </li>
              </mat-nested-tree-node>
            </mat-tree>
          </div>

          <!-- Main Content Section - Change 'folders' to 'currentItems' -->
          <div [ngClass]="{'col-9': isTreeVisible, 'col-12': !isTreeVisible}" class="flex explorer">
            <div class="row" *ngIf="Admin == 'MyFileMangement'">
              <div class="col-md-4">
                <ng-select bindLabel="name" [appendTo]="'body'" [multiple]="false" bindValue="id"
                           [placeholder]="'ged.SELECT_LIST_PLACEHOLDER' | translate" [(ngModel)]="selectedItem"
                           (change)="changeValue()">
                  <ng-option *ngFor="let item of select " [value]="item.id">{{ item.name | translate }}</ng-option>
                </ng-select>
              </div>

              <div class="col-md-4" *ngIf="selectedItem == 2">
                <ng-select [appendTo]="'body'" [items]="externalUsers" bindLabel="username" [multiple]="false"
                           bindValue="username"
                           [placeholder]="'GED.SELECT_EXTERNAL_USER_PLACEHOLDER' | translate"
                           [(ngModel)]="selectedUserEx"
                           (change)="findFolderByUserName(selectedUserEx)">
                </ng-select>
              </div>

              <div class="col-md-4" *ngIf="selectedItem == 1">
                <ng-select [appendTo]="'body'" [items]="internalUsers" bindLabel="username" [multiple]="false"
                           bindValue="username"
                           [placeholder]="'ged.SELECT_INTERNAL_USER_PLACEHOLDER' | translate"
                           [(ngModel)]="selectedUserEx"
                           (change)="findFolderByUserName(selectedUserEx)">
                </ng-select>
              </div>
            </div>

            <div class="h-100 mt-4 box-sizing">

              <ng-container *ngIf="isLoading">
                <div id="loadingBar">
                  <div class="d-flex justify-content-center">
                    <div class="row img-logo">
                      <div class="col-12">
                        <div class="spinner-border" role="status">
                          <span class="sr-only" id="loading"></span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </ng-container>

              <ng-container *ngIf="!isLoading">
                <div class="container" fxFlex fxLayout="row" fxLayoutAlign="space-between stretch">
                  <div class="content" fxFlex fxLayout="row">
                    <!-- CHANGE: folders -> currentItems -->
                    <mat-grid-list cols="6" fxFlex *ngIf="currentItems.length > 0 || add">
                      <!-- CHANGE: folders -> currentItems -->
                      <mat-grid-tile *ngFor="let element of currentItems; let i = index;" class="file-or-folder" (contextmenu)="onContextMenu($event, element)">
                        <div fxLayout="column" fxLayoutAlign="space-between center" class="text-center">
                          <!-- Folder icon -->
                          <mat-icon class="file-or-folder-icon pointer iconeGrey" *ngIf="element.isFolder" data-toggle="tooltip" data-placement="top" [matTooltip]="getTooltipTextFolder(element.name, element.creationDate | date:'dd/MM/yyyy HH:mm')" (click)="next(element)">folder</mat-icon>

                          <!-- File icon with extension badge -->
                          <mat-icon class="file-or-folder-icon pointer iconeGrey" *ngIf="!element.isFolder" data-toggle="tooltip" data-placement="top" [matTooltip]="getTooltipTextFile(element.name, element.creationDate | date:'dd/MM/yyyy HH:mm', element.size/1024 | number:'1.2-2', element.type)" (click)="openfileNew(element)">
                            <div *ngIf="!element.isFolder" class="rounded extension" [ngClass]="{
                              'Pdf': element.extension === 'pdf',
                              'Csv': element.extension === 'csv',
                              'Txt': element.extension === 'txt',
                              'Jpg': element.extension === 'jpg',
                              'Png': element.extension === 'png',
                              'Doc': element.extension === 'docx',
                              'pptx': element.extension === 'pptx',
                              'xlsx': element.extension === 'xlsx',
                              'zip': element.extension === 'zip',
                              'css': element.extension === 'css',
                              'scss': element.extension === 'scss'
                            }">{{ element.extension }}</div>
                            insert_drive_file
                          </mat-icon>

                          <div class="fixed-hidden-position" [style.left]="contextMenuPosition.x" [style.top]="contextMenuPosition.y" [matMenuTriggerFor]="contextMenu"></div>
                          <mat-menu #contextMenu="matMenu">
                            <ng-template matMenuContent let-item="element">
                              <div *ngIf="isFile()">
                                <button mat-menu-item (click)="downloadFile()" *ngIf="checkPermissions('SHOW_FILES_MANAGER') && Admin != 'MyFile'">
                                  <mat-icon>download</mat-icon>
                                  {{ 'ged.DOWNLOAD' | translate }}
                                </button>
                                <button mat-menu-item (click)="downloadFile()" *ngIf="checkPermissions('SHOW_FILES') && Admin == 'MyFile'">
                                  <mat-icon>download</mat-icon>
                                  {{ 'ged.DOWNLOAD' | translate }}
                                </button>

                                <button mat-menu-item (click)="rename()" *ngIf="checkPermissions('RENAME_FILES') && navigationpath() == false && Admin == 'MyFile'">
                                  <mat-icon>edit</mat-icon>
                                  {{ 'ged.RENAME' | translate }}
                                </button>
                                <button mat-menu-item (click)="rename()" *ngIf="checkPermissions('RENAME_FILES_MANAGER') && navigationpath() == false && Admin != 'MyFile'">
                                  <mat-icon>edit</mat-icon>
                                  {{ 'ged.RENAME' | translate }}
                                </button>
                                <button mat-menu-item (click)="deleteFolder()" *ngIf="checkPermissions('DELETE_FILES') && navigationpath() == false && Admin == 'MyFile'">
                                  <mat-icon>delete</mat-icon>
                                  {{ 'ged.DELETE' | translate }}
                                </button>
                                <button mat-menu-item (click)="deleteFolder()" *ngIf="checkPermissions('DELETE_FILES_MANAGER') && navigationpath() == false && Admin != 'MyFile'">
                                  <mat-icon>delete</mat-icon>
                                  {{ 'ged.DELETE' | translate }}
                                </button>
                              </div>

                              <div *ngIf="isFolder() && navigationpath() == false">
                                <button mat-menu-item (click)="deleteFolder()" *ngIf="checkPermissions('DELETE_FILES_MANAGER') && Admin != 'MyFile'">
                                  <mat-icon>delete</mat-icon>
                                  {{ 'ged.DELETE' | translate }}
                                </button>
                                <button mat-menu-item (click)="deleteFolder()" *ngIf="checkPermissions('DELETE_FILES') && Admin == 'MyFile'">
                                  <mat-icon>delete</mat-icon>
                                  {{ 'ged.DELETE' | translate }}
                                </button>
                                <button mat-menu-item (click)="rename()" *ngIf="checkPermissions('RENAME_FILES') && Admin == 'MyFile'">
                                  <mat-icon>edit</mat-icon>
                                  {{ 'ged.RENAME' | translate }}
                                </button>
                                <button mat-menu-item (click)="rename()" *ngIf="checkPermissions('RENAME_FILES_MANAGER') && Admin != 'MyFile'">
                                  <mat-icon>edit</mat-icon>
                                  {{ 'ged.RENAME' | translate }}
                                </button>
                                <button mat-menu-item (click)="downloadFolder()" *ngIf="checkPermissions('DOWNLOAD_FILES') && Admin == 'MyFile'">
                                  <mat-icon>download</mat-icon>
                                  {{ 'ged.DOWNLOAD' | translate }}
                                </button>
                              </div>
                            </ng-template>
                          </mat-menu>
                          <br>
                          <span class="text-center break-word">{{ element.name }}</span><br>
                        </div>
                      </mat-grid-tile>

                      <!-- Add folder tile -->
                      <mat-grid-tile *ngIf="add">
                        <div fxLayout="column" fxLayoutAlign="space-between center">
                          <mat-icon color="primary" class="file-or-folder-icon pointer">folder</mat-icon>
                          <br>
                          <form [formGroup]="form">
                            <input type="text" class="text-center input-width border-0" (keyup.escape)="addFolder()" id="myInput" formControlName="myInput" (keyup.enter)="onEnter()" [(ngModel)]="folderName" />
                            <i></i>
                          </form>
                        </div>
                      </mat-grid-tile>
                    </mat-grid-list>

                    <!-- CHANGE: folders -> currentItems -->
                    <div class="d-flex justify-content-center mt-4" *ngIf="currentItems.length == 0 && !add">
                      <label>{{ 'Le dossier est vide' | translate }}</label>
                    </div>
                  </div>
                </div>
              </ng-container>
            </div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
