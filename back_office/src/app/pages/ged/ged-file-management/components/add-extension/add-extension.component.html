<form class="border-card" [formGroup]="formGroup" (ngSubmit)="onSubmit()">
  <h3 class="title">{{ title }}</h3>
  <div class="row">
    <div class="col-md-3">
      <mat-form-field class="example-full-width" appearance="outline">
        <label>{{ "ged.EXTENSION" | translate }}</label>
        <input matInput value="" formControlName="extension" readonly />
      </mat-form-field>
    </div>

    <div class="col-md-5">
      <mat-form-field class="example-full-width" appearance="outline">
        <label>{{ "ged.MAXIMUM_SIZE" | translate }}</label>
        <input
          matInput
          placeholder="Maximum Size"
          value=""
          formControlName="maxSize"
          type="number"
          step="0.1"
          min="0"
        />
      </mat-form-field>
    </div>
    <div class="col-md-2">
      <label> </label>
      <ng-select
        [appendTo]="'body'"
        [items]="unit"
        #ngSelectComponent1
        bindLabel="code"
        placeholder="Unit"
        formControlName="unit"
      >
      </ng-select>
    </div>
  </div>

  <div class="row">
    <div class="position-btn">
      <button type="button" type="submit" class="btn btn-success" (click)="onSubmit()">
        {{ "button.SAVE" | translate }}
      </button>
      <button
        type="button"
        (click)="closeDialog(false)"
        type="button"
        class="btn btn-danger btn-close"
      >
        {{ "button.CANCEL" | translate }}
      </button>
    </div>
  </div>
</form>
