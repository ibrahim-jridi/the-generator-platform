<div class="row">
  <div class="col-sm-12">
    <div class="table-responsive">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <!-- id Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef class=" label-head"> {{ 'ged.ID' | translate }}</th>
          <td mat-cell *matCellDef="let element"> {{ element.id }}</td>
        </ng-container>

        <!-- label Column -->
        <ng-container matColumnDef="extesnion">
          <th mat-header-cell *matHeaderCellDef class=" label-head">

            <div *ngIf="!showFilterInput" class="label-head-title">{{ 'ged.EXTENSION' | translate }}
              <span class="material-symbols-outlined span-view" (click)="toggleFilterInput('extension')">search</span>
            </div>

            <ng-container *ngIf="showFilterInput" class="form-input" [formGroup]="formInputFilter">
              <mat-form-field class="form-input" class="search-form-field" floatLabel="never">
                <input matInput class="form-input" autocomplete="off" placeholder="{{ 'ged.EXTENSION'|translate}}"
                       value="" formControlName="extension" (ngModelChange)="searchData($event)"/>
              </mat-form-field>
              <span class="material-symbols-outlined btn-icon" (click)="clearSearch()">close</span>
            </ng-container>
          </th>
          <td mat-cell *matCellDef="let element" class=""> {{ element.extension }}</td>
        </ng-container>


        <!-- size Column -->
        <ng-container matColumnDef="size">
          <th mat-header-cell *matHeaderCellDef class=" label-head"> {{ 'ged.SIZE' | translate }}</th>
          <td mat-cell *matCellDef="let element"> {{ element.maxSize / 1000 }}</td>
        </ng-container>

        <!-- actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class=" label-head">
            <div class="table-head-container">

              <div class="label-head-title">
                {{ 'demo.table.ACTIONS' | translate }}
              </div>
            </div>
          </th>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns" class="center"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="center"></tr>
      </table>
    </div>
  </div>
</div>
