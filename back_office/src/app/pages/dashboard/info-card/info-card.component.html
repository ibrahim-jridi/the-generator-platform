<div
  class="info-card"
  [ngClass]="{'selected': isSelected}"
  (click)="onCardClick()">
  <div class="info-card-body d-flex flex-column">
    <div class="d-flex justify-content-between align-items-center">
      <span class="info-card-title" [ngClass]="{'selected': isSelected}">{{ cardData.title | translate }}</span>
      <i class="info-card-icon {{ cardData.icon }}" [ngClass]="{'selected': isSelected}" ></i>
    </div>
    <div class="my-3 d-flex flex-column justify-content-center align-items-center">
      <span class="info-card-text" [ngClass]="{'selected': isSelected}">{{ 'dashboard.TOTAL' | translate }}</span>
      <span class="total-number" [ngClass]="{'selected': isSelected}">{{ cardData.total }}</span>
    </div>
    <div class="d-flex" [ngClass]="{'selected': isSelected}" [ngStyle]="{'justify-content': cardData.stats.length === 1 ? 'center' : 'space-between'}">
      <div *ngFor="let stat of cardData.stats; let i = index"
           class="d-flex flex-column align-items-center"
           [ngStyle]="{
             'color': isSelected ? 'white' : getColorForStat(i, cardData.stats.length)
           }">
        <span class="stat-value" [ngClass]="{'selected': isSelected}">{{ stat.value }}</span>
        <small class="stat-label text-center" [ngClass]="{'selected': isSelected}">{{ stat.label | translate }}</small>
      </div>
    </div>
</div>
</div>
