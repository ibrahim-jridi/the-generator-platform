<div class="upload-container justify-content-end" (dragover)="handleDragOver($event)" (drop)="handleDrop($event)">
  <small> {{ title }} </small>
  <div class="upload-card">
    <div class="card-body">
      <div class="progress-text" *ngIf="isLoading">{{ progressBarValue }}%</div>
      <mat-progress-bar mode="determinate" [value]="progressBarValue" *ngIf="isLoading"></mat-progress-bar>
      <div class="upload-logo" *ngIf="!isLoading">
        <img src="assets/images/configuration/upload.svg" alt="Upload Logo">
      </div>
      <div class="d-flex align-items-center justify-content-center" *ngIf="!isLoading">
        <div *ngIf="file; else fileInputText" class="text mb-2">
          <ng-container *ngIf="file.name; else showFileContent">
            <strong>{{ file.name | truncateFileName : 50 }}</strong>
          </ng-container>
          <ng-template #showFileContent>
            <strong>{{ file }}</strong>
          </ng-template>
          <button *ngIf="showClearButton" class="btn btn-sm btn-danger ml-2" (click)="clearSelectedFile()">X</button>
        </div>
        <ng-template #fileInputText>
          <div class="text ml-5">{{ displayPanelPhotoPlaceholder }}</div>
          <div class="btn btn-small ml-2" (click)="openFileInput()" onKeyPress="" onKeyDown="" onKeyUp="">
            <span class="text"> {{displayPanelPhoto}} </span>
            <input #fileInput type="file" style="display: none;" (change)="handleFileSelected($event)" />
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</div>
